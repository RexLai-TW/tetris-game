<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄羅斯方塊 - Tetris</title>
    <style>
        body {
            background: #202028;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 20px;
            border: 4px solid #fff;
            padding: 20px;
            background: #000;
            position: relative;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #111;
        }
        .stats {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 150px;
        }
        h1 { margin: 0 0 20px 0; }
        .score-label { font-size: 24px; }
        .next-piece-container {
            margin-top: 20px;
            border: 1px solid #555;
            padding: 10px;
            text-align: center;
        }
        #next-canvas {
            background-color: #111;
            border: 1px solid #333;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border: 2px solid red;
            text-align: center;
            display: none;
            z-index: 30;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #fff;
            border: none;
            margin-top: 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover {
            background: #ccc;
        }
    </style>
</head>
<body onload="initGame()">
    <h1 id="title">俄羅斯方塊</h1>
    <div id="game-container" style="position: relative;">
        <div id="overlay">
            <h2 id="overlay-text">準備好了嗎？</h2>
            <button id="start-btn" onclick="startGame()">點擊開始遊戲</button>
        </div>

        <div>
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>
        <div class="stats">
            <div>
                <div class="score-label">分數: <span id="score">0</span></div>
                <div class="next-piece-container">
                    <div>下一塊:</div>
                    <canvas id="next" width="80" height="80"></canvas>
                </div>
            </div>
            <div>
                <p>操作說明：</p>
                <p>← → : 移動</p>
                <p>↑ : 旋轉</p>
                <p>↓ : 加速下落</p>
            </div>
        </div>

        <div id="game-over">
            <h2>遊戲結束</h2>
            <p>最終分數: <span id="final-score">0</span></p>
            <button onclick="resetGame()">重新開始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        context.scale(20, 20);
        nextContext.scale(20, 20);

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        const colors = [
            null,
            '#FF0D72', // T
            '#0DC2FF', // I
            '#0DFF72', // S
            '#F538FF', // Z
            '#FF8E0D', // L
            '#FFE135', // J
            '#3877FF', // O
        ];

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(context, arena, {x: 0, y: 0});
            drawMatrix(context, player.matrix, player.pos);
        }

        function drawNext() {
            nextContext.fillStyle = '#111';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            const offsetX = (4 - player.next.matrix[0].length) / 2;
            const offsetY = (4 - player.next.matrix.length) / 2;
            drawMatrix(nextContext, player.next.matrix, {x: offsetX, y: offsetY});
        }

        function drawMatrix(ctx, matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter++;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (!player.next) {
                player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            player.matrix = player.next.matrix;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);

            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

            if (collide(arena, player)) {
                gameOver();
            }
            drawNext();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
        }

        function gameOver() {
            gameRunning = false;
            gameOverScreen.style.display = 'block';
            finalScoreElement.innerText = player.score;
        }

        function resetGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            updateScore();
            gameRunning = true;
            gameOverScreen.style.display = 'none';
            overlay.style.display = 'none';
            playerReset();
            requestAnimationFrame(gameLoop);
        }

        const arena = createMatrix(12, 20);
        let gameRunning = false;
        let dropCounter = 0;
        let lastTime = 0;

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            next: null,
            score: 0,
        };

        function gameLoop(time = 0) {
            if (!gameRunning) return;

            if (lastTime === 0) lastTime = time;
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > 1000) {
                playerDrop();
                dropCounter = 0;
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameRunning = true;
            overlay.style.display = 'none';
            lastTime = performance.now();
            playerReset();
            updateScore();
            drawNext();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function initGame() {
            draw();
        }

        document.addEventListener('keydown', event => {
            if (!gameRunning) return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
        });
    </script>
</body>
</html>
